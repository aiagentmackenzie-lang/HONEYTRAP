version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: honeytrap
      POSTGRES_USER: honeytrap
      POSTGRES_PASSWORD: honeytrap
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  core:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      HONEYTRAP_DATABASE_URL: postgres://honeytrap:honeytrap@postgres:5432/honeytrap?sslmode=disable
      HONEYTRAP_DATA_DIR: /srv/honeytrap/var
    ports:
      - "2222:2222"
      - "8080:8080"
      - "2121:2121"
      - "9161:9161/udp"
    command: ["deploy", "default"]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://honeytrap:honeytrap@postgres:5432/honeytrap?sslmode=disable
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
