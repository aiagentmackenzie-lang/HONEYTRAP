# HONEYTRAP Deploy Profile: Default
# All 7 services enabled, AI emulation on

services:
  ssh:
    enabled: true
    port: 2222
    banner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.1"
    max_sessions: 100

  ssh_enhanced:
    enabled: true
    port: 2223
    banner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.1"
    ai_emulation: true
    max_sessions: 50

  http:
    enabled: true
    port: 8080
    max_sessions: 200

  http_enhanced:
    enabled: true
    port: 8443
    ai_emulation: true
    fake_login: true
    fake_dashboard: true
    max_sessions: 100

  ftp:
    enabled: true
    port: 2121
    banner: "220 VSFTPD 3.0.5"
    max_sessions: 50

  redis:
    enabled: true
    port: 6379
    ai_emulation: true
    max_sessions: 50

  udp:
    enabled: true
    port: 9161
    max_sessions: 50

ai:
  enabled: true
  ollama_url: "http://localhost:11434"
  model: "llama3.2:3b"
  cache_size: 512
  cache_ttl: 3600
  fallback: true

alerts:
  slack:
    enabled: false
    webhook_url: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    from: ""
    to: ""
    username: ""
    password: ""

export:
  stix_enabled: true
  auto_export: false
  export_interval: 3600

logging:
  level: info
  pcap_capture: false
  pcap_dir: "/var/lib/honeytrap/pcap"